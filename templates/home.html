<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Form</title>
</head>
<body>
    <h1>Student Performance Prediction</h1>
    <form method="POST" action="/predictdata">
        <label>Gender:</label>
        <input type="text" name="gender" required><br><br>

        <label>Ethnicity:</label>
        <input type="text" name="ethnicity" required><br><br>

        <label>Parental Level of Education:</label>
        <input type="text" name="parental_level_of_education" required><br><br>

        <label>Lunch:</label>
        <input type="text" name="lunch" required><br><br>

        <label>Test Preparation Course:</label>
        <input type="text" name="test_preparation_course" required><br><br>

        <label>Reading Score:</label>
        <input type="number" name="reading_score" required><br><br>

        <label>Writing Score:</label>
        <input type="number" name="writing_score" required><br><br>

        <input type="submit" value="Predict">
    </form>

    {% if results is defined %}
        <h2>Predicted Math Score: {{ results }}</h2>
    {% endif %}
</body>
</html>
